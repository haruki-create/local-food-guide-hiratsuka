<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地元食道ガイド平塚</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header js-scroll-target">
        <h1 class="site-title">地元食道ガイド平塚</h1>
        <p class="site-subtitle">典型的なカタログではなく、個人の物語と温かいつながりに焦点を当てた、平塚の学生向けローカル飲食ガイド</p>
    </header>

    <main class="container">
        <!-- お店カード1 -->
        <article class="card js-scroll-target">
            <div class="card-image">
                <!-- 写真を入れるときはここを <img src="ファイル名.jpg" alt="説明" style="width:100%; height:100%; object-fit:cover;"> に書き換えます -->
                <span class="photo-placeholder">PHOTO</span>
            </div>
            <div class="card-content">
                <div class="tags">
                    <span class="tag">#背徳のカロリー</span>
                    <span class="tag">#テスト前の駆け込み寺</span>
                </div>
                <h2 class="shop-name">喫茶 〇〇（仮）</h2>
                <p class="shop-description">
                    「ここ、テスト前によく泣きながら駆け込んでたんだよね」と先輩が教えてくれた場所。マスターの絶品オムライスと優しいおしゃべりで、すっと肩の力が抜ける。
                </p>
            </div>
        </article>

        <!-- お店カード2 -->
        <article class="card js-scroll-target">
            <div class="card-image">
                <span class="photo-placeholder">PHOTO</span>
            </div>
            <div class="card-content">
                <div class="tags">
                    <span class="tag">#深夜の語り場</span>
                    <span class="tag">#店主のキャラクターが強い</span>
                </div>
                <h2 class="shop-name">食堂 △△（仮）</h2>
                <p class="shop-description">
                    終電近くまで学生がバカな話を語り合える隠れ家。一見強面だけど実は世話好きなお母さんが作る、胃袋にしみる唐揚げ定食が最高。
                </p>
            </div>
        </article>
    </main>

    <!-- スクロールアニメーションを何度でも繰り返すためのスクリプト -->
    <script>
        const targets = document.querySelectorAll('.js-scroll-target');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // 画面に入ったらクラスを追加してアニメーション実行
                    entry.target.classList.add('is-active');
                } else {
                    // 画面から出たらクラスを外す（これにより何度でも繰り返される）
                    entry.target.classList.remove('is-active');
                }
            });
        }, { threshold: 0.1 }); // 10%見えたら発火

        targets.forEach(target => {
            observer.observe(target);
        });
    </script>
</body>
</html>
